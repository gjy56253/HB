<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>21st Universe - Lan Yufei</title>
    <!-- 引入绝美的手写英文字体和中文行书字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
    <style>
        /* ================= 全局与基础设置 ================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #111;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; font-family: 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            overflow: hidden; color: white; margin: 0;
        }
        
        /* ================= 终极魔法：绝对锁定完美比例 ================= */
        #app-container {
            position: relative; background-color: #000; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            
            /* 1. 锁定你电脑上预览的最完美的绝对比例 */
            aspect-ratio: 480 / 750;
            
            /* 2. 基础宽度设为完美宽度 */
            width: 480px; 
            
            /* 3. 让它在各种小屏幕(手机/iPad)上自适应缩放，但绝不破坏比例 */
            max-width: 100%;
            max-height: 100%;
            /* 无论设备怎么变，里面的一切(文字、背景)都会等比缩放，一模一样！ */
        }

        .section {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0; visibility: hidden; transition: opacity 1.5s ease;
            background-size: cover; background-position: center bottom;
        }
        .section.active { opacity: 1; visibility: visible; }
        #whiteout {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 999; opacity: 0; pointer-events: none;
            transition: opacity 1.5s ease;
        }
        .hint {
            position: absolute; bottom: 8%; width: 100%; text-align: center;
            font-size: 0.85rem; color: rgba(255,255,255,0.8);
            letter-spacing: 2px; animation: breathe 2s infinite; z-index: 50; cursor: pointer;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }
        @keyframes breathe { 0% {opacity:0.3;} 50% {opacity:1;} 100% {opacity:0.3;} }

        /* ================= 播放控制页 ================= */
        #start-screen {
            position: absolute; z-index: 1000; width: 100%; height: 100%;
            background: linear-gradient(135deg, #f0cfd1 0%, #e4b5b6 100%);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden;
        }
        
        .start-stars {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 80px 70px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 150px 160px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
                radial-gradient(2px 2px at 290px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 330px 180px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
                radial-gradient(3px 3px at 220px 250px, rgba(255,255,255,0.5), rgba(0,0,0,0));
            background-repeat: repeat; background-size: 400px 400px;
            animation: twinkle 4s infinite alternate; opacity: 0.5;
        }
        @keyframes twinkle { 0% {opacity: 0.2;} 100% {opacity: 0.8;} }

        .start-title {
            font-size: 4rem; color: #fff; margin-bottom: 50px;
            font-family: 'Great Vibes', 'Brush Script MT', cursive;
            text-shadow: 0 4px 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.5);
            animation: floatTitle 4s infinite ease-in-out; z-index: 10;
        }
        @keyframes floatTitle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .start-btn {
            position: relative; padding: 12px 45px; border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 50px; letter-spacing: 4px; font-size: 1.6rem; color: #fff;
            font-family: 'Zhi Mang Xing', 'STXingkai', '华文行楷', 'KaiTi', serif;
            background: rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(228, 181, 182, 0.5);
            backdrop-filter: blur(8px); cursor: pointer; transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10;
        }
        .start-btn:hover {
            background: rgba(255, 255, 255, 0.95); color: #e4b5b6; 
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.9), inset 0 0 10px rgba(228, 181, 182, 0.3); transform: scale(1.05);
        }
        .start-btn:active { transform: scale(0.95); }

        /* ================= 序章：天台 ================= */
        #prologue-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/bg_rooftop.jpg');
            background-size: cover; background-position: center bottom;
            transition: transform 3s ease-in-out, filter 2.5s ease-in-out; z-index: 1;
        }
        
        .prologue-text {
            position: absolute; opacity: 0; transition: opacity 1.5s ease, transform 2s ease, filter 2s ease; 
            text-shadow: 2px 2px 6px rgba(0,0,0,0.8); z-index: 10;
        }
        
        /* 比例锁死后，采用最完美的 top/left 百分比定位，再也不会飘了！并且强制不换行 */
        .text-on-wall {
            top: 48%; left: 25%; width: 50%; 
            text-align: center; transform: rotate(1deg); 
            font-family: '楷体', serif; font-size: 1.1rem; line-height: 2; letter-spacing: 2px;
            white-space: nowrap; 
        }
        
        .text-compact {
            top: 45%; left: 20%; width: 60%; 
            text-align: center; font-size: 0.8rem; line-height: 1.8; 
            transform: rotate(1deg); font-family: '楷体', serif; letter-spacing: 1px;
            white-space: nowrap;
        }

        .pro-line { opacity: 0; transition: opacity 1.5s ease; white-space: nowrap; }

        .blow-away {
            opacity: 0 !important; transform: translateX(20px) translateY(-10px) skewX(-15deg) scale(1.1); filter: blur(8px);
        }

        #char-prologue {
            position: absolute; bottom: 2%; left: 50%; transform: translateX(-50%);
            height: 55vh; object-fit: contain; z-index: 5; 
            transition: all 2s cubic-bezier(0.25, 0.46, 0.45, 0.94); transform-origin: bottom center;
        }

        /* ================= 后续章节样式 ================= */
        #camera { background-image: url('images/bg_classroom.jpg'); transition: background-image 1.5s ease; }
        #char-camera { position: absolute; bottom: 5%; left: -10%; height: 50vh; object-fit: contain; z-index: 20; opacity: 0; transition: opacity 1s; }
        .polaroid { position: absolute; width: 45%; background: white; padding: 10px 10px 30px 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 10; opacity: 0; transform: scale(1.5); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .polaroid img { width: 100%; height: auto; display: block; border-radius: 2px; }
        .polaroid .caption { color: #333; text-align: center; font-size: 0.9rem; margin-top: 15px; font-family: '楷体', serif; }
        .flash { position: absolute; top:0; left:0; width:100%; height:100%; background:white; opacity:0; z-index:90; pointer-events:none; transition: opacity 0.2s; }

        /* ================= 游戏篇章与特效 ================= */
        #game { background: #1a1a2e; color: #e0e0e0; font-family: monospace; }
        #game-bg { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; transition: all 1s; }
        #game-char { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); height: 55vh; z-index: 10; opacity: 0; transition: all 1s; }
        .game-ui { position: absolute; bottom: 5%; left: 5%; width: 90%; max-height: 55vh; overflow-y: auto; background: rgba(0,0,0,0.85); border: 2px solid #4a4e69; border-radius: 10px; padding: 20px; z-index: 30; box-shadow: 0 0 15px rgba(0,0,0,0.8); display: none; }
        .game-text { font-size: 1rem; line-height: 1.6; margin-bottom: 20px; }
        .game-btn { display: block; width: 100%; padding: 12px; margin-bottom: 10px; background: #22223b; border: 1px solid #c9ada7; color: white; border-radius: 5px; text-align: center; font-size: 1rem; cursor: pointer; transition: all 0.3s; }
        .game-btn:active { background: #c9ada7; color: #22223b; }
        .btn-attack { background: #8B0000; border-color: #ff4d4d; font-weight: bold; animation: breathe 1s infinite; }

        .holo-grid { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; background: linear-gradient(transparent 95%, rgba(0, 255, 255, 0.4) 100%), linear-gradient(90deg, transparent 95%, rgba(0, 255, 255, 0.4) 100%); background-size: 30px 30px; transform: perspective(400px) rotateX(60deg); transform-origin: bottom center; opacity: 0; animation: gridRise 3s ease-out forwards; }
        @keyframes gridRise { 0% { opacity: 0; transform: perspective(400px) rotateX(80deg) translateY(100px); } 40% { opacity: 0.7; } 100% { opacity: 0.2; transform: perspective(400px) rotateX(55deg) translateY(0); } }
        .light-sweep { position: absolute; top: 0; left: -100%; width: 50%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); transform: skewX(-20deg); animation: sweep 2.5s ease-in-out 0.5s forwards; }
        @keyframes sweep { 0% { left: -100%; } 100% { left: 200%; } }
        .glow-drop { position: absolute; top: 0; left: 50%; width: 6px; height: 15px; background: #fff; box-shadow: 0 0 10px 5px rgba(100,200,255,0.8); border-radius: 50%; transform: translateX(-50%); animation: drop 1.2s ease-in forwards; }
        @keyframes drop { 0% { top: -20px; opacity: 1; } 90% { top: 50%; opacity: 1; transform: translateX(-50%) scale(1); } 100% { top: 50%; opacity: 0; transform: translateX(-50%) scale(3); } }
        .magic-flash { position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: radial-gradient(circle, rgba(150,220,255,0.8) 0%, transparent 60%); transform: translate(-50%, -50%) scale(0); opacity: 0; animation: flashExpand 2s ease-out 1.1s forwards; }
        @keyframes flashExpand { 0% { transform: translate(-50%, -50%) scale(0); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; } }
        .galaxy-rotate { position: absolute; top: 50%; left: 50%; border-radius: 50%; border: 1px dashed rgba(150,220,255,0.4); animation: rotateGalaxy 10s infinite linear; }
        @keyframes rotateGalaxy { 0% { transform: rotate(0deg) scale(0.8); opacity: 0;} 20% { opacity: 1; transform: rotate(72deg) scale(1);} 80% { opacity: 1; } 100% { transform: rotate(360deg) scale(1.2); opacity: 0;} }
        .particle { position: absolute; width: 4px; height: 4px; background: #fff; border-radius: 50%; box-shadow: 0 0 6px 2px rgba(150,220,255,0.8); animation: floatParticle 4s infinite linear; }
        @keyframes floatParticle { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 20% { opacity: 1; } 80% { opacity: 1; } 100% { transform: translateY(-80px) rotate(360deg); opacity: 0; } }

        /* ================= 最终章：彩蛋 ================= */
        #epilogue { background: linear-gradient(135deg, #f0cfd1 0%, #e4b5b6 100%); color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.15); overflow: hidden; }
        .typewriter-container { position: absolute; top: 15%; left: 5%; width: 90%; text-align: center; font-family: '楷体', serif; font-size: 1.25rem; line-height: 2.2; letter-spacing: 2px; }
        #cake { position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%); font-size: 6rem; cursor: pointer; opacity: 0; transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94); z-index: 10; }
        
        #ticket-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            width: 85%; z-index: 20; transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            padding: 10px; background: rgba(255, 255, 255, 0.2); border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.6), inset 0 0 20px rgba(255, 255, 255, 0.3); backdrop-filter: blur(5px);
        }
        #ticket-container::before, #ticket-container::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid rgba(255, 255, 255, 0.8); }
        #ticket-container::before { top: 5px; left: 5px; border-right: none; border-bottom: none; border-radius: 5px 0 0 0; }
        #ticket-container::after { bottom: 5px; right: 5px; border-left: none; border-top: none; border-radius: 0 0 5px 0; }
        
        #ticket { width: 100%; display: block; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .ticket-sparkle {
            position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px #ffb3c6; opacity: 0; pointer-events: none; animation: floatSparkle 3s infinite ease-in-out;
        }
        @keyframes floatSparkle { 0%, 100% { transform: translateY(0) scale(1); opacity: 0; } 50% { transform: translateY(-20px) scale(1.5); opacity: 1; } }

        .footer { position: absolute; bottom: 5%; width: 100%; text-align: center; font-size: 0.7rem; color: rgba(255,255,255,0.6); font-family: sans-serif; opacity: 0; }
        .smoke { position: absolute; width: 12px; height: 12px; background: rgba(255,255,255,0.8); border-radius: 50%; filter: blur(3px); pointer-events: none; z-index: 12; opacity: 0; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="start-screen">
        <div class="start-stars"></div>
        <div class="start-title">21st Universe</div>
        <div class="start-btn" onclick="startExperience()">开启二十一岁宇宙</div>
    </div>
    <div id="whiteout"></div>

    <section id="prologue" class="section" onclick="nextPrologue()">
        <div id="prologue-bg"></div>
        <div id="pro-text1" class="prologue-text text-on-wall">洛枳爱盛淮南，<br>谁也不知道。</div>
        <div id="pro-text2" class="prologue-text text-on-wall">盛淮南爱洛枳，<br>全世界都知道。</div>
        
        <div id="pro-text3" class="prologue-text text-compact">
            <div class="pro-line">长大是一切的谜底。</div>
            <div class="pro-line">全世界最优秀的兰雨菲女士，</div>
            <div class="pro-line">也必将如愿以偿，</div>
            <div class="pro-line">得到想要的一切。</div>
        </div>
        <img src="images/girl_school.png" id="char-prologue" onerror="this.src='images/girl_school.jpg'">
    </section>

    <section id="camera" class="section" onclick="nextCamera()">
        <div class="flash" id="cam-flash"></div><img src="images/girl_camera.png" id="char-camera" onerror="this.src='images/girl_camera.jpg'"><div id="photos-container"></div>
    </section>
    
    <section id="game" class="section"><img src="" id="game-bg"><img src="" id="game-char"><div class="game-ui" id="dialog-box"><div class="game-text" id="dialog-text"></div><div id="dialog-options"></div></div></section>
    
    <section id="epilogue" class="section">
        <div class="start-stars"></div>
        <div class="typewriter-container" id="typewriter"></div>
        <div id="cake" onclick="openGift()">🎂<br><span style="font-size:0.9rem;color:rgba(255,255,255,0.8);display:block;text-align:center;text-shadow:none;">点击吹蜡烛</span></div>
        <div id="ticket-container">
            <img src="images/giftticket.jpg" id="ticket">
        </div>
        <div class="footer" id="epi-footer">Designed with love by Gao Jiayu | For Lan Yufei's 21st Universe</div>
    </section>

    <!-- 隐藏的全局背景音乐 -->
    <audio id="bgMusic" loop>
        <source src="music/bgm.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
    let state = { prologueStep: 0, cameraStep: 0, prof: '', map: '', partner: '' };
    let prologueReady = false; 

    function getEl(id) { return document.getElementById(id); }
    function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); getEl(id).classList.add('active'); }
    function flashWhiteout(callback) { getEl('whiteout').style.opacity = 1; setTimeout(() => { if(callback) callback(); getEl('whiteout').style.opacity = 0; }, 1500); }
    
    // ================= 序章核心动画逻辑 =================
    function startExperience() {
        getEl('start-screen').style.display = 'none';

        // 尝试播放音乐
        let bgm = getEl('bgMusic');
        if(bgm) { bgm.play().catch(e => console.log("音乐播放需要用户交互", e)); }

        showSection('prologue');
        
        setTimeout(() => {
            getEl('prologue-bg').style.transform = "scale(1.8) translate(-22%, 10%)";
            getEl('char-prologue').style.transform = "translateX(-15%) translateY(-12%) scale(0.55)";
            
            setTimeout(() => {
                getEl('pro-text1').style.opacity = 1;
                prologueReady = true; 
            }, 3000); 
        }, 100);
    }

    function nextPrologue() {
        if(!prologueReady) return; 

        state.prologueStep++;
        prologueReady = false; 

        if(state.prologueStep === 1) {
            getEl('prologue-bg').style.filter = "brightness(0.3) contrast(1.2)"; 
            getEl('pro-text1').classList.add('blow-away'); 
            
            setTimeout(() => { 
                getEl('prologue-bg').style.filter = "brightness(1.2) sepia(0.2) hue-rotate(-10deg)"; 
                getEl('pro-text2').style.opacity = 1; 
                prologueReady = true; 
            }, 1500);
        }
        else if(state.prologueStep === 2) {
            getEl('pro-text2').classList.add('blow-away'); 
            
            setTimeout(() => { 
                getEl('pro-text3').style.opacity = 1; 
                
                let lines = document.querySelectorAll('.pro-line');
                lines[0].style.opacity = 1;
                setTimeout(() => { lines[1].style.opacity = 1; }, 1200);
                setTimeout(() => { lines[2].style.opacity = 1; }, 2400);
                setTimeout(() => { 
                    lines[3].style.opacity = 1; 
                    prologueReady = true; 
                }, 3600);
                
            }, 1000);
        }
        else if(state.prologueStep === 3) {
            getEl('pro-text3').classList.add('blow-away');
            
            getEl('char-prologue').style.transform = "translateX(-15%) translateY(-12%) scale(0.55) scaleX(-1)";
            
            setTimeout(() => {
                getEl('char-prologue').style.transform = "translateX(5%) translateY(-22%) scale(0.35) scaleX(1)"; 
                getEl('prologue-bg').style.transform = "scale(2.8) translate(-36%, 15%)";
            }, 600); 
            
            setTimeout(() => {
                flashWhiteout(() => {
                    showSection('camera');
                    setTimeout(() => { getEl('char-camera').style.opacity = 1; }, 500);
                });
            }, 2000);
        }
    }

    // ================= 第一章逻辑 (回忆) =================
    const camScenes = [
        { bg: 'images/bg_classroom.jpg', pic: 'images/jiaoshi.jpg', text: "故事开始的地方", rot: -6, x: '6%', y: '5%' },
        { bg: 'images/bg_playground.jpg', pic: 'images/caochang.jpg', text: "操场上的笑声，<br>是我们不结束的夏天。", rot: 8, x: '45%', y: '12%' },
        { bg: 'images/bg_hometown_chengdu.jpg', pic: 'images/chengdu1.jpg', text: "成都的街头，<br>是我们最初的远方。", rot: -5, x: '10%', y: '22%' },
        { bg: 'images/bg_hometown_chengdu.jpg', pic: 'images/chengdu2.jpg', text: "冬日里的烤匠，<br>热气腾腾的温暖记忆。", rot: 6, x: '42%', y: '28%' },
        { bg: 'images/bg_qingdao.jpg', pic: 'images/qingdao1.jpg', text: "青岛的海风，<br>吹散了所有的烦恼。", rot: -8, x: '8%', y: '40%' },
        { bg: 'images/bg_qingdao.jpg', pic: 'images/qingdao2.jpg', text: "偶遇的发财镜，<br>祝我们早日暴富！", rot: 10, x: '45%', y: '46%' },
        { bg: 'images/bg_shenzhen.jpg', pic: 'images/shenzhen1.jpg', text: "深圳的繁华夜色，<br>映照着我们的梦想。", rot: -4, x: '12%', y: '58%' },
        { bg: 'images/bg_shenzhen.jpg', pic: 'images/shenzhen2.jpg', text: "演唱会前的准备，<br>期待已久的狂欢。", rot: 7, x: '42%', y: '64%' },
        { bg: 'images/bg_shanghai.jpg', pic: 'images/shanghai.jpg', text: "从校园到世界，这十年，最好的我们。", rot: 0, x: '25%', y: '38%', isLast: true }
    ];
    
    function nextCamera() {
        if(state.cameraStep >= camScenes.length) {
            getEl('camera').style.filter = "contrast(2) grayscale(1)"; 
            setTimeout(() => { showSection('game'); initGame(); }, 800); return;
        }
        let scene = camScenes[state.cameraStep];
        getEl('cam-flash').style.opacity = 1; setTimeout(() => { getEl('cam-flash').style.opacity = 0; }, 150);
        getEl('camera').style.backgroundImage = `url('${scene.bg}')`;
        let photo = document.createElement('div'); photo.className = 'polaroid';
        photo.style.left = scene.x; photo.style.top = scene.y;
        
        if(scene.isLast) photo.style.boxShadow = "0 15px 30px rgba(0,0,0,0.8)";
        
        photo.innerHTML = `<img src="${scene.pic}"><div class="caption">${scene.text}</div>`;
        getEl('photos-container').appendChild(photo);
        
        setTimeout(() => { 
            let scale = scene.isLast ? 1.1 : 1; 
            photo.style.opacity = 1; 
            photo.style.transform = `rotate(${scene.rot}deg) scale(${scale})`; 
        }, 50);
        state.cameraStep++;
    }

    // ================= 第二章逻辑 =================
    function initGame() { 
        getEl('game-bg').src = 'images/bg_rooftop.jpg'; 
        getEl('game-bg').style.opacity = 0.2; 
        
        let introText = "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>欢迎来到『二十一岁魔法宇宙』。<br><br>这里是你的故乡——【东方繁星海港】，海风温柔，星光璀璨。但在遥远的海域彼端，还有一片未知的【风暴魔法大陆】。<br><br>近来，在世界的交界处耸立起了一座座名为『偏见』的巨大石像，它们投下阴影，让弱小的生灵失去了阳光。传闻中，只有拥有纯粹正义感与主角光环的女侠，才能打破石像的桎梏。<br><br>女侠，请选择你的初始职业，开启传说的篇章吧！</div>";

        setTimeout(() => { 
            showGameUI(introText, [
                { text: '【筑梦师】', act: () => pickProf('architect') }, 
                { text: '【炼金术士】', act: () => pickProf('chemistry') }
            ]); 
        }, 1000); 
    }

    function showGameUI(text, options) { 
        getEl('dialog-box').style.display = 'block'; 
        getEl('dialog-text').innerHTML = text; 
        let optsHtml = ''; 
        options.forEach((opt, idx) => { optsHtml += `<div class="game-btn ${opt.class||''}" id="btn-${idx}">${opt.text}</div>`; }); 
        getEl('dialog-options').innerHTML = optsHtml; 
        options.forEach((opt, idx) => { getEl(`btn-${idx}`).onclick = () => { getEl('dialog-box').style.display = 'none'; opt.act(); }; }); 
    }

    function pickProf(prof) { 
        state.prof = prof; 
        getEl('game-char').src = `images/girl_${prof}.png`; 
        getEl('game-char').style.opacity = 1; 
        
        showGameUI(`职业已确认。<br><br>女侠，请开启你的旅途！`, [
            { text: '开启旅途', act: showWorkScene }
        ]); 
    }

    function showWorkScene() {
        getEl('game-char').style.opacity = 0; 
        let bg = getEl('game-bg');
        bg.src = `images/${state.prof}_scene.jpg`;
        bg.style.opacity = 1;
        bg.style.transition = "transform 6s ease-out, filter 2s";
        bg.style.transform = "scale(1.15)";
        getEl('dialog-box').style.display = 'none';

        let fx = document.createElement('div');
        fx.id = 'fx-overlay';
        fx.style.position = 'absolute';
        fx.style.top = '0'; fx.style.left = '0'; fx.style.width = '100%'; fx.style.height = '100%';
        fx.style.pointerEvents = 'none'; fx.style.zIndex = '15';
        getEl('game').appendChild(fx);

        if (state.prof === 'architect') {
            fx.innerHTML = `<div class="holo-grid"></div><div class="light-sweep"></div>`;
        } else {
            fx.innerHTML = `<div class="glow-drop"></div><div class="magic-flash"></div><div class="particles-container"></div>`;
            let pCont = fx.querySelector('.particles-container');
            for(let i=1; i<=3; i++) {
                let circle = document.createElement('div'); circle.className = 'galaxy-rotate';
                circle.style.width = (i*80) + 'px'; circle.style.height = (i*80) + 'px';
                circle.style.marginTop = -(i*40) + 'px'; circle.style.marginLeft = -(i*40) + 'px';
                circle.style.animationDelay = (i*0.5) + 's'; pCont.appendChild(circle);
            }
            for(let i=0; i<20; i++) {
                let p = document.createElement('div'); p.className = 'particle';
                p.style.left = (30 + Math.random()*40) + '%'; p.style.top = (30 + Math.random()*40) + '%';
                p.style.animationDelay = (Math.random()*2) + 's'; pCont.appendChild(p);
            }
        }

        let storyText = state.prof === 'architect'
            ? "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>你曾用手中的发光丁字尺，在故乡画下无数坚固的堡垒与绝美的空中楼阁，你的才华早已闪耀星海。<br><br>然而，想要锻造出能彻底击碎『偏见石像』的终极巨剑，似乎需要前往【风暴魔法大陆】寻找稀有的图纸；但若留在【东方繁星海港】深耕，这里的人脉与资源同样能助你筑起通天的高塔。<br><br>前方的分岔路口，你要去往哪里？</div>"
            : "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>你曾用精准的试剂与冷静的智慧，在故乡点亮过无数真理的星系，你的才华早已闪耀星海。<br><br>然而，想要调配出能彻底溶解『偏见石像』的终极魔药，似乎需要前往【风暴魔法大陆】寻找神秘的配方；但若留在【东方繁星海港】深耕，这里的顶级实验室与深厚根基同样能助你破解万物之谜。<br><br>前方的分岔路口，你要去往哪里？</div>";

        setTimeout(() => {
            let existingFx = getEl('fx-overlay');
            if(existingFx) existingFx.remove(); 
            
            bg.style.transition = "all 1s"; 
            bg.style.opacity = 0.5; 
            
            showGameUI(storyText, [
                { text: '驻守【东方繁星海港】', act: () => pickMap('city') },
                { text: '远航【风暴魔法大陆】', act: () => pickMap('aboard') }
            ]);
        }, 5000); 
    }

    function pickMap(map) { 
        state.map = map; 
        let bg = getEl('game-bg');
        bg.style.transform = "scale(1)"; 
        bg.src = `images/${state.prof}_${map}.jpg`; 
        bg.style.opacity = 0.8; 
        
        setTimeout(() => {
            bg.style.transition = "transform 15s linear";
            bg.style.transform = "scale(1.15) translate(-2%, 2%)";
        }, 100);

        let mapStory = "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>地图已解锁。不管是深耕熟悉的港湾，还是在风暴的荒野开拓，女侠所到之处，皆是属于你的王国。</div>";

        showGameUI(mapStory, [
            { text: '继续前行', act: () => showEncounter(map) }
        ]); 
    }

    function showEncounter(map) {
        let bg = getEl('game-bg');
        bg.style.transition = "all 1s"; 
        bg.style.opacity = 0; 

        setTimeout(() => {
            bg.src = `images/couple_cheers.jpg`; 
            bg.style.transform = "scale(1)"; 
            bg.style.opacity = 0.8; 
            
            setTimeout(() => {
                bg.style.transition = "transform 12s ease-out";
                bg.style.transform = "scale(1.1) translate(2%, 2%)";
            }, 100);

            let encounterStory = "";
            if(map === 'city') {
                encounterStory = "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>在繁星海港的一场盛大庆典中，你遇到了一位同路人。<br><br>你们在喧闹的人群中偶然举杯，却惊讶地发现彼此对未来的规划如此契合。没有多余的客套，只有灵魂共鸣的默契。</div>";
            } else {
                encounterStory = "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>在风暴大陆的未知荒野里，你遇到了一位同样在探索世界边界的同路人。<br><br>你们在一次偶然的危机中背靠背击退了危险，配合得天衣无缝。你们分享着各自的见闻，仿佛认识了多年的旧识。</div>";
            }

            showGameUI(encounterStory, [
                { text: '夜幕渐深...', act: showDance }
            ]); 
        }, 500); 
    }

    function showDance() {
        let bg = getEl('game-bg');
        bg.style.transition = "all 1s"; 
        bg.style.opacity = 0; 

        setTimeout(() => {
            bg.src = `images/couple_dance.jpg`; 
            bg.style.transform = "scale(1.15)"; 
            bg.style.opacity = 0.8; 
            
            setTimeout(() => {
                bg.style.transition = "transform 12s ease-out";
                bg.style.transform = "scale(1) translate(-2%, -2%)";
            }, 100);

            let danceStory = "<div style='font-size:0.95rem; line-height:1.7; text-align:justify;'>旅途的疲惫在相视一笑中消散。<br><br>你们聊着沿途的风景与各自的梦想，灵魂的碰撞让这段旅程不再孤单。你们无比合拍，仿佛两颗注定要在此时交汇的星星。</div>";

            showGameUI(danceStory, [
                { text: '迎接破晓', act: showBossChoice }
            ]); 
        }, 500);
    }

    function showBossChoice() {
        showGameUI('天亮了，宿命的Boss【偏见石像】就在前方。女侠的选择是？', [
            { text: '【轻装上阵：独自踏上征途】', act: () => pickPartner('solo') }, 
            { text: '【并肩作战：与他结伴前行】', act: () => pickPartner('couple') }
        ]);
    }

    function pickPartner(partner) { 
        state.partner = partner; 
        getEl('game-bg').src = `images/${state.partner}_fight.jpg`; 
        
        showGameUI('无论是否有人同行，女侠的旅途注定灿烂。爱是自由，不是束缚。', [
            { text: '迎战Boss', act: showBossFight }
        ]); 
    }
    
    function showBossFight() { 
        getEl('game-bg').src = `images/${state.partner}_fight.jpg`; 
        setTimeout(() => { 
            showGameUI('【偏见石像】: "这座塔太高，石头太重，女孩子是建不好的，乖乖退下吧！"', [
                { text: '发动主角光环：斩断偏见', class: 'btn-attack', act: executeBoss }
            ]); 
        }, 1000); 
    }

    function executeBoss() { 
        getEl('app-container').style.animation = "shake 0.5s"; 
        getEl('game-bg').style.filter = "invert(1)"; 
        setTimeout(() => { 
            getEl('game-bg').style.filter = "none"; 
            getEl('game-bg').src = `images/${state.partner}_success.jpg`; 
            getEl('app-container').style.animation = ""; 
            showGameUI('在名为兰雨菲的宇宙里，你永远是拥有主角光环的女侠。永远不要害怕选错，因为你的坚韧、善良与正义，才是通关的唯一秘籍。', [
                { text: '领取通关奖励', act: goToEpilogue }
            ]); 
        }, 600); 
    }

    // ================= 最终章逻辑 (结局与绝美生日彩蛋) =================
    function goToEpilogue() { showSection('epilogue'); setTimeout(typeText, 1000); }
    const finalMsg = "恭喜通关，兰雨菲女士！<br><br>祝你21岁生日快乐，万事胜意！<br><br>你看，21岁的第一天你就已经突破了第一个关卡，所以以后也一定会顺顺顺！<br><br>接下来，领取通关者的奖励吧～";
    let typeIndex = 0;
    
    function typeText() { 
        if(typeIndex < finalMsg.length) { 
            let char = finalMsg.charAt(typeIndex); 
            if(char === '<') { 
                getEl('typewriter').innerHTML += "<br>"; 
                typeIndex += 4; 
            } else { 
                getEl('typewriter').innerHTML += char; 
                typeIndex++; 
            } 
            setTimeout(typeText, 80); 
        } else { 
            getEl('cake').style.opacity = 1; 
        } 
    }
    
    function openGift() { 
        let cake = getEl('cake');
        
        for(let i=0; i<6; i++) {
            let smoke = document.createElement('div');
            smoke.className = 'smoke';
            smoke.style.left = (48 + Math.random()*4) + '%';
            smoke.style.top = '80%'; 
            getEl('epilogue').appendChild(smoke);
            
            setTimeout(() => {
                smoke.style.opacity = 1;
                smoke.style.transition = "all 1s ease-out";
                smoke.style.transform = `translate(${(Math.random()-0.5)*80}px, -120px) scale(${1 + Math.random()*2})`;
                smoke.style.opacity = 0;
            }, 50);
        }

        cake.style.transform = "translateX(-50%) scale(1.2)";
        cake.style.filter = "blur(8px)";
        cake.style.opacity = 0; 
        
        getEl('typewriter').style.opacity = 0; 
        
        setTimeout(() => { 
            getEl('ticket-container').style.transform = "translate(-50%, -50%) scale(1)"; 
            getEl('epi-footer').style.opacity = 1; 
            
            let tc = getEl('ticket-container');
            for(let i=0; i<8; i++){
                let s = document.createElement('div');
                s.className = 'ticket-sparkle';
                s.style.left = (Math.random() > 0.5 ? -20 : 100) + Math.random()*20 + '%';
                s.style.top = (Math.random()*100) + '%';
                s.style.animationDelay = (Math.random()*2) + 's';
                tc.appendChild(s);
            }
        }, 800); 
    }
</script>
</body>
</html>
